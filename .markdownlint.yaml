# markdownlint-cli2 config
# https://github.com/DavidAnson/markdownlint
default: true

# Line length — disabled for prose-heavy docs.
MD013: false

# Allow inline HTML — used for banners, badges, mermaid wrappers.
MD033: false

# Allow duplicate headings under different parents.
MD024:
  siblings_only: true

# Allow bare URLs (badges, citations).
MD034: false

# Allow first-line h1 to differ from filename slug.
MD041: false

# Permit punctuation in heading text (forensic terms, paths).
MD026: false
