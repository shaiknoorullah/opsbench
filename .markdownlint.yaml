# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
default: true
MD013: false   # line length — too restrictive for prose docs
MD024: false   # duplicate headings — auto-changelogs need this
MD025: false   # single H1 — auto-changelogs append multiple top-level
MD004:
  style: consistent   # allow either asterisk or dash, just be consistent within a file
MD012:
  maximum: 2   # allow 2 blank lines (auto-changelog formatting)
MD041: false   # first line H1
MD033: false   # inline HTML
MD040: false   # fenced code language — many ASCII diagrams and prose code blocks don't have a language
MD060: false   # table column style — repo uses compact tables, not enforcing a style
