# Collection Plan Template
# Generated by evidence-source-discovery, consumed by evidence-collection-orchestrator

incident_id: <SHORT-ID-2026-MM-DD-NNN>
incident_time_utc: <YYYY-MM-DDTHH:MM:SSZ>
discovery_time_utc: <YYYY-MM-DDTHH:MM:SSZ>
discovery_window: incident_time ±60min  # default; can extend if retention allows

cluster:
  k8s_version: ""
  cni: ""
  context: ""
  master_count: 0
  worker_count: 0

# === Layer 1: K8s control plane ===
sources:
  control_plane:
    enabled: true
    priority: P0
    output_dir: cluster-scoped/
    commands:
      - cmd: "kubectl get events -A --sort-by='.lastTimestamp' -o yaml"
        out: events.yaml
        note: "1h TTL — collect FIRST"
      - cmd: "kubectl get all -A -o yaml"
        out: all-resources.yaml
      - cmd: "kubectl get pv,pvc -A -o yaml"
        out: persistentvolumes.yaml

  # === Layer 3: Observability ===
  observability:
    prometheus:
      enabled: false
      endpoint: ""
      retention: ""
      query_window_minutes: 60
      queries:
        - name: load1
          promql: 'node_load1{instance=~"<filter>"}'
        - name: iowait
          promql: 'rate(node_cpu_seconds_total{mode="iowait"}[1m])'
    loki:
      enabled: false
      endpoint: ""
      logql_queries:
        - name: workload-logs
          logql: '{namespace="<ns>",pod=~"<pod-pattern>"}'
          window_minutes: 60
    tempo:
      enabled: false

  # === Layer 4-5: Nodes + Storage ===
  node_level:
    enabled: true
    access_method: ""   # "kubectl debug node" | "ssh" | "az ssh arc"
    nodes_to_collect: []
    commands_per_node:
      - "journalctl -k --since '<incident_time - 1h>' --until '<incident_time + 30min>'"
      - "dmesg -T"
      - "iostat -xz 1 30"
      - "vmstat 1 30"
      - "ps auxf"
      - "lsblk -o NAME,SIZE,TYPE,MOUNTPOINT,ROTA,MODEL"
      - "mount"
      - "ip addr"
      - "ip route"
      - "conntrack -C"
      - "wg show"
      - "for d in $(lsblk -dno NAME | grep -v loop); do smartctl -a /dev/$d 2>&1 | head -50; done"

  storage:
    longhorn:
      enabled: false
      volumes_to_dump: []
      include_engine_logs: true
      include_replica_state: true
      include_manager_logs: true
    ceph:
      enabled: false

  # === Layer 6: Network ===
  network:
    calico:
      enabled: false
      include_felix_logs_per_node: true
    cilium:
      enabled: false
    wireguard:
      enabled: false

  # === Layer 7: App-layer system tables ===
  app_layer:
    postgres:
      enabled: false
      pods_to_query: []
      queries:
        - "SELECT * FROM pg_stat_activity"
        - "SELECT * FROM pg_stat_replication"
        - "SELECT * FROM pg_stat_user_tables ORDER BY n_tup_ins DESC LIMIT 50"
    clickhouse:
      enabled: false
      pods_to_query: []
      queries:
        - "SELECT * FROM system.replicas FORMAT Vertical"
        - "SELECT * FROM system.replication_queue FORMAT Vertical"
        - "SELECT * FROM system.parts WHERE active FORMAT Vertical"
        - "SELECT * FROM system.processes FORMAT Vertical"

  # === Layer 8: Security ===
  security:
    falco:
      enabled: false
    audit:
      enabled: false

  # === Layer 9: Platform ===
  platform:
    cntb:
      enabled: false
      instances: []
    azure:
      enabled: false
      resource_groups: []

skip_sources: []
skip_reasons: {}

budgets:
  per_family_minutes: 15
  total_minutes: 30
  estimated_artifacts: 0
  estimated_size_mb: 0
