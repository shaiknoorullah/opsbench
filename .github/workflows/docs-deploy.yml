name: docs-deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "packages/*/README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Build site
        run: |
          if [[ ! -f docs/.vitepress/config.mts ]]; then
            echo "VitePress config not yet present — emitting README as placeholder site."
            mkdir -p ./_site
            cp README.md ./_site/index.md || true
            exit 0
          fi
          npm install --no-save vitepress
          npx vitepress build docs
          mv docs/.vitepress/dist ./_site
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
