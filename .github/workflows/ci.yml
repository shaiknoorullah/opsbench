name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#CHANGELOG.md" "#platform/spikes" "#tools/plugin-build/output"

  cspell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"   # cspell v10 requires Node >=22.18
      - run: npx --yes cspell --no-progress --no-must-find-files "**/*.md"

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install yamllint
      - run: yamllint .

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shopt -s globstar nullglob
          mapfile -t files < <(find scripts tools packages -type f -name "*.sh" 2>/dev/null)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell scripts found."
            exit 0
          fi
          shellcheck "${files[@]}"

  schema-validate:
    name: json-schema-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npx --yes -p ajv-cli@5 -p ajv-formats ajv compile --spec=draft2020 -c ajv-formats -s "packages/*/schemas/*.json"

  frontmatter:
    name: skill+agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/validate-skill.sh
      - run: bash scripts/validate-agent.sh

  install-dry-run:
    name: installer --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare fake prefix
        run: mkdir -p /tmp/.claude-test
      - name: bash -n
        run: bash -n scripts/install.sh
      - name: dry-run
        env:
          OPSBENCH_PREFIX: /tmp/.claude-test
        run: bash scripts/install.sh --dry-run

  cedar-and-hooks:
    name: cedar policy gate + hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Cedar gate (schema + policy validation + decision battery)
        run: npm run test:policies --workspace @opsbench/team-incident-response
      - name: Hook tests (bats)
        run: npm run test:hooks --workspace @opsbench/team-incident-response

  go:
    name: go (control-plane services)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: platform/go.mod
          cache-dependency-path: platform/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test -timeout 120s ./...
