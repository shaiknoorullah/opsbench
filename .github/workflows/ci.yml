name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#CHANGELOG.md"

  cspell:
    name: cspell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes cspell --no-progress --no-must-find-files "**/*.md"

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yamllint
      - run: yamllint .

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shopt -s globstar nullglob
          mapfile -t files < <(find scripts tools packages -type f -name "*.sh" 2>/dev/null)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell scripts found."
            exit 0
          fi
          shellcheck "${files[@]}"

  schema-validate:
    name: json-schema-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes ajv-cli@5 compile -s "packages/*/schemas/*.json"

  frontmatter:
    name: skill+agent frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/validate-skill.sh
      - run: bash scripts/validate-agent.sh

  install-dry-run:
    name: installer --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare fake prefix
        run: mkdir -p /tmp/.claude-test
      - name: bash -n
        run: bash -n scripts/install.sh
      - name: dry-run
        env:
          OPSBENCH_PREFIX: /tmp/.claude-test
        run: bash scripts/install.sh --dry-run

  cedar-validate:
    name: cedar-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect cedar files
        id: detect
        run: |
          if find . -name "*.cedar" -not -path "./node_modules/*" | grep -q .; then
            echo "found=yes" >> "$GITHUB_OUTPUT"
          else
            echo "found=no" >> "$GITHUB_OUTPUT"
          fi
      - name: Install cedar-policy-cli
        if: steps.detect.outputs.found == 'yes'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env"
          cargo install --locked cedar-policy-cli
      - name: Validate cedar
        if: steps.detect.outputs.found == 'yes'
        run: |
          # shellcheck disable=SC1091
          . "$HOME/.cargo/env" || true
          find . -name "*.cedar" -not -path "./node_modules/*" -print0 | while IFS= read -r -d '' f; do
            echo "Validating $f"
            cedar validate --policies "$f" --schema /dev/null || true
          done
