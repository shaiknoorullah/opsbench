name: Bug report
description: Something is broken or behaves unexpectedly.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the fields below — the more detail, the faster we can help.
        For security issues, see [SECURITY.md](https://github.com/shaiknoorullah/opsbench/blob/main/SECURITY.md) — do NOT open a public issue.
  - type: input
    id: version
    attributes:
      label: opsbench version
      description: Output of `cat ~/.claude/skills/.opsbench-version 2>/dev/null` or release tag installed.
      placeholder: v3.0.0
    validations:
      required: true
  - type: dropdown
    id: agent-runtime
    attributes:
      label: Agent runtime
      multiple: false
      options:
        - Claude Code
        - Codex CLI
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04 / macOS 14.5
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include exact commands and inputs.
      placeholder: |
        1. Run `...`
        2. Trigger skill `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/shaiknoorullah/opsbench/blob/main/CODE_OF_CONDUCT.md).
          required: true
