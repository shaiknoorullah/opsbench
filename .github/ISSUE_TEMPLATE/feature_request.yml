name: Feature request
description: Suggest an enhancement or new capability.
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing problem, not the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - team-incident-response
        - installer / scripts
        - tooling / CI
        - docs
        - new team (use the "New team proposal" template instead)
        - other
    validations:
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/shaiknoorullah/opsbench/blob/main/CODE_OF_CONDUCT.md).
          required: true
