# lefthook — git hooks runner
# https://github.com/evilmartians/lefthook
#
# Install:  npm install   (runs `lefthook install` via prepare script)
# Manual:   npx lefthook install
#
# Skip locally with:    LEFTHOOK=0 git commit ...
# Skip a single hook:   LEFTHOOK_EXCLUDE=lint git commit ...

min_version: 1.7.0

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
      skip:
        - merge
        - rebase
    markdownlint:
      glob: "*.md"
      # Throwaway spike artifacts under platform/spikes/** are exempt from doc
      # linting (same policy as generated docs/superpowers/research/**).
      exclude: "platform/spikes/"
      run: npx markdownlint-cli2 {staged_files}
      skip:
        - merge
        - rebase
    yamllint:
      glob: "*.{yml,yaml}"
      run: yamllint {staged_files}
      skip:
        - merge
        - rebase
    cspell:
      glob: "*.{md,txt}"
      run: npx cspell --no-progress --no-must-find-files {staged_files}
      skip:
        - merge
        - rebase
    cedar-validate:
      # Validates the Cedar schema + tools.cedar + governors.cedar and runs the decision
      # battery against the real Cedar engine (policies/cedar/validate.mjs). Triggered when any
      # Cedar policy/schema changes.
      glob: "*.{cedar,cedarschema}"
      run: npm run test:policies --workspace @opsbench/team-incident-response
      skip:
        - merge
        - rebase
    hook-tests:
      # Runs the bats suite for the team hooks when a hook script changes.
      glob: "packages/**/hooks/**/*.sh"
      run: npm run test:hooks --workspace @opsbench/team-incident-response
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    validate-skills:
      run: bash scripts/validate-skill.sh
    validate-agents:
      run: bash scripts/validate-agent.sh
    install-syntax:
      run: bash -n scripts/install.sh
